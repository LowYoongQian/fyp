server {
    listen PORT_PLACEHOLDER;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob:; script-src 'self' http: https: 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' http: https: 'unsafe-inline'; font-src 'self' http: https: data:; img-src 'self' http: https: data: blob:; connect-src 'self' http: https: wss: ws:; worker-src 'self' blob:;" always;
    }
}
